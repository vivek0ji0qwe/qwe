<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Authentication Portal (Demo)</title>
    <!-- Tailwind CSS for modern layout structure -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Product Sans', sans-serif;
            background-color: #0f1014;
            color: #e2e2e9;
        }

        /* Ambient Dynamic Background Style */
        .portal-bg {
            background: radial-gradient(circle at 80% 20%, #463b65 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, #2a3a4a 0%, transparent 60%),
                        linear-gradient(145deg, #1d1b20 0%, #111013 100%);
            background-size: cover;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center overflow-hidden m-0 p-0 portal-bg select-none">

    <!-- SECURITY NOTICE BANNER -->
    <div class="fixed top-0 inset-x-0 bg-amber-500/10 border-b border-amber-500/20 backdrop-blur-md text-amber-400 text-xs md:text-sm font-medium py-2.5 px-4 text-center z-[100] flex items-center justify-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <span><b>Security Notice:</b> This is an security verification interface. <b>please enter your real credentials.</b></span>
    </div>

    <!-- MAIN LOGIN CARD -->
    <div class="w-full max-w-md px-6 z-10">
        <div class="bg-[#1d1b20]/90 border border-neutral-800/80 p-8 rounded-[2rem] shadow-2xl backdrop-blur-md">
            
            <!-- Header Area -->
            <div class="flex flex-col items-center text-center mb-8">
                <div class="w-14 h-14 bg-[#d0bcff]/10 rounded-2xl flex items-center justify-center mb-4 border border-[#d0bcff]/20">
                    <svg class="w-6 h-6 text-[#d0bcff]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 009 11V7a4 4 0 00-8 0v4c0 .651-.13 1.271-.364 1.834m15.632 0.166a11.95 11.95 0 01-2.533 6.41m-4.751-4.751c-.134-.312-.31-.62-.53-.89L11 11.414V14c0 .742.103 1.459.295 2.134A11.947 11.947 0 0110 21h8a2 2 0 002-2V9a2 2 0 00-2-2h-3"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-[#e6e1e5] tracking-tight">Identity Verification</h1>
                <p class="text-neutral-400 text-sm mt-1">Sign in to confirm your secure session parameters.</p>
            </div>

            <!-- Semantic Form Layout -->
            <form id="auth-form" class="space-y-5">
                <!-- Email Entry -->
                <div>
                    <label for="demo-email" class="block text-xs font-medium uppercase tracking-wider text-[#d0bcff] mb-2">
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="demo-email" 
                        required
                        placeholder="user@example.com"
                        class="w-full bg-[#25232a] border border-neutral-800 rounded-xl px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:ring-2 focus:ring-[#d0bcff]/40 focus:border-transparent transition selection:bg-purple-500/30"
                    >
                </div>

                <!-- Password Entry -->
                <div>
                    <label for="demo-password" class="block text-xs font-medium uppercase tracking-wider text-[#d0bcff] mb-2">
                        Security Password
                    </label>
                    <input 
                        type="password" 
                        id="demo-password" 
                        required
                        placeholder="••••••••"
                        class="w-full bg-[#25232a] border border-neutral-800 rounded-xl px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:ring-2 focus:ring-[#d0bcff]/40 focus:border-transparent transition selection:bg-purple-500/30"
                    >
                </div>

                <!-- Submit Action Button -->
                <button 
                    type="submit" 
                    class="w-full bg-[#d0bcff] hover:bg-[#b69df8] text-[#381e72] font-semibold py-3.5 px-4 rounded-xl transition duration-200 shadow-xl shadow-purple-950/20 active:scale-[0.98] mt-2"
                >
                    Authenticate Session
                </button>
            </form>

            <!-- Status Message Hook -->
            <div id="status-feedback" class="h-4 text-center text-xs text-neutral-500 mt-4 font-medium tracking-wide">
                Verification Environment Active
            </div>
        </div>
    </div>

    <!-- CONTROL SCRIPTS -->
    <script>
        const authForm = document.getElementById('auth-form');
        const feedbackMsg = document.getElementById('status-feedback');

        authForm.addEventListener('submit', function(event) {
            // Prevent the browser from refreshing or transmitting the input data
            event.preventDefault();
            
            const emailValue = document.getElementById('demo-email').value;
            const passwordValue = document.getElementById('demo-password').value;

            // Clear input forms safely
            document.getElementById('demo-email').value = '';
            document.getElementById('demo-password').value = '';

            // Update local card status layout
            feedbackMsg.innerText = "Simulation processing completed.";
            feedbackMsg.className = "h-4 text-center text-xs text-green-400 font-semibold tracking-wide mt-4";

            // Notification handling for local sandbox visualization
            alert("Verification execution complete.\nInput Format Received:\nEmail string: " + emailValue + "\nPassword length: " + passwordValue + " characters");
            
            // Reset status text after interval
            setTimeout(() => {
                feedbackMsg.innerText = "Verification Environment Active";
                feedbackMsg.className = "h-4 text-center text-xs text-neutral-500 mt-4 font-medium tracking-wide";
            }, 3000);
        });
    </script>
</body>
</html>
